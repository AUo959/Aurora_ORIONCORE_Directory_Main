name: Aurora CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Tests & Workspace Verification (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}
    env:
      PYTHONPATH: ${{ github.workspace }}

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.12"]
        include:
          # 3.12 is the declared floor (.python-version) and gates merges.
          # Aligns with CloudBank runtime.txt and the local devkit python3.12 entry.
          - python-version: "3.12"
            experimental: false
          # 3.9 mirrors the macOS Xcode system Python; kept experimental to
          # surface version-skew regressions without blocking merges.
          # Retire this leg once all scripts are verified 3.12-only.
          - python-version: "3.9"
            experimental: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "${{ matrix.python-version }}"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml

      # The crew-life and live/powered-watch integration tests drive the L1
      # simulation harness, which expects the CloudBank clone and the CanonRec
      # L1 character ledger nested under GUMAS_SIM_2.5/. Provision both so the
      # harness resolves them (see tools/hour_aboard.py path resolution).
      # Pin to the exact commits recorded in catalog/repo_registry.yaml so the
      # workspace-verification repo_head_match check passes deterministically.
      # Update both places together if the canonical nested-repo heads move.
      - name: Provision CloudBank simulation clone (public)
        uses: actions/checkout@v6
        with:
          repository: AUo959/aurora-cloudbank-symbolic
          ref: 8194ecb05fa81dba631bf3bff9b40e3dfe257a91
          path: GUMAS_SIM_2.5/Aurora_Sim_Architecture/aurora-cloudbank-symbolic-main

      - name: Check CanonRec access token
        env:
          CANONREC_TOKEN: ${{ secrets.WORKSPACE_REPO_TOKEN }}
        run: |
          if [ -z "$CANONREC_TOKEN" ]; then
            echo "::error::Secret WORKSPACE_REPO_TOKEN is required to clone the private AUo959/CanonRec repo for the L1 integration tests. Add a fine-grained PAT (or GitHub App token) with read access to AUo959/CanonRec as the repository secret WORKSPACE_REPO_TOKEN."
            exit 1
          fi

      - name: Provision CanonRec L1 ledger (private)
        uses: actions/checkout@v6
        with:
          repository: AUo959/CanonRec
          ref: 5731c50862e1fc9f7079ef9b22505597a8cb3d75
          token: ${{ secrets.WORKSPACE_REPO_TOKEN }}
          path: GUMAS_SIM_2.5/CanonRec

      # actions/checkout at a pinned SHA leaves the repo in detached HEAD; the
      # workspace-verification repo_branch_match check expects branch `main`.
      # Re-point a local main branch at the pinned commit so both branch and
      # head_sha match catalog/repo_registry.yaml.
      - name: Place provisioned repos on their canonical branch
        run: |
          git -C GUMAS_SIM_2.5/Aurora_Sim_Architecture/aurora-cloudbank-symbolic-main checkout -B main
          git -C GUMAS_SIM_2.5/CanonRec checkout -B main

      - name: Install CloudBank runtime deps (mesh server + engines)
        run: pip install -r GUMAS_SIM_2.5/Aurora_Sim_Architecture/aurora-cloudbank-symbolic-main/requirements.txt

      - name: Prepare CI artifact directory
        run: mkdir -p reports/ci

      - name: Sync skills for CI drift checks
        run: python tools/sync_skills.py --apply --target codex

      - name: Run test suite
        run: |
          set -o pipefail
          pytest tests/ -v --tb=short --junitxml=reports/ci/pytest-py${{ matrix.python-version }}.xml \
            2>&1 | tee reports/ci/pytest-py${{ matrix.python-version }}.log

      - name: Upload pytest report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-report-py${{ matrix.python-version }}
          path: |
            reports/ci/pytest-py${{ matrix.python-version }}.log
            reports/ci/pytest-py${{ matrix.python-version }}.xml
          if-no-files-found: warn
          retention-days: 30

      - name: Run workspace verification
        run: python tools/workspace_verify.py --report-out reports/ci/workspace-verify-py${{ matrix.python-version }}.json
        continue-on-error: false

      - name: Upload verification report
        if: always() && hashFiles(format('reports/ci/workspace-verify-py{0}.json', matrix.python-version)) != ''
        uses: actions/upload-artifact@v7
        with:
          name: workspace-verify-report-py${{ matrix.python-version }}
          path: reports/ci/workspace-verify-py${{ matrix.python-version }}.json
          retention-days: 30

  sync-audit:
    name: Repo Sync Audit
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Run root sync audit
        run: python skills/gitwiz-github-manager/scripts/gitwiz_sync_audit.py --repo root
        continue-on-error: true

  lint:
    name: Lint & Schema Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jsonschema

      - name: Validate YAML manifests
        run: |
          python -c "
          import yaml, sys, pathlib
          errors = []
          for f in pathlib.Path('catalog').glob('*.yaml'):
              try:
                  yaml.safe_load(f.read_text())
              except yaml.YAMLError as e:
                  errors.append(f'{f}: {e}')
          for f in pathlib.Path('catalog').glob('*.yml'):
              try:
                  yaml.safe_load(f.read_text())
              except yaml.YAMLError as e:
                  errors.append(f'{f}: {e}')
          if errors:
              print('\n'.join(errors), file=sys.stderr)
              sys.exit(1)
          print('All YAML manifests valid.')
          "

      - name: Validate JSON catalog files
        run: |
          python -c "
          import json, sys, pathlib
          errors = []
          for f in pathlib.Path('catalog').glob('*.json'):
              try:
                  json.loads(f.read_text())
              except json.JSONDecodeError as e:
                  errors.append(f'{f}: {e}')
          for f in pathlib.Path('catalog/schemas').glob('*.json'):
              try:
                  json.loads(f.read_text())
              except json.JSONDecodeError as e:
                  errors.append(f'{f}: {e}')
          for f in pathlib.Path('catalog/contracts').glob('*.json'):
              try:
                  json.loads(f.read_text())
              except json.JSONDecodeError as e:
                  errors.append(f'{f}: {e}')
          if errors:
              print('\n'.join(errors), file=sys.stderr)
              sys.exit(1)
          print('All JSON files valid.')
          "

      - name: Validate Codex plugin JSON files
        run: |
          python -c "
          import json, sys, pathlib
          errors = []
          paths = [pathlib.Path('.agents/plugins/marketplace.json')]
          paths.extend(pathlib.Path('plugins').glob('*/.codex-plugin/plugin.json'))
          paths.extend(pathlib.Path('plugins').glob('*/skills/*/references/*.schema.json'))
          for f in paths:
              try:
                  json.loads(f.read_text())
              except (json.JSONDecodeError, FileNotFoundError) as e:
                  errors.append(f'{f}: {e}')
          if errors:
              print('\n'.join(errors), file=sys.stderr)
              sys.exit(1)
          print('All Codex plugin JSON files valid.')
          "

      - name: Check for tracked files exceeding size limit
        run: |
          python -c "
          import subprocess, sys
          LIMIT = 1_000_000
          result = subprocess.run(
              ['git', 'ls-files', '-z'],
              capture_output=True, text=True
          )
          oversized = []
          for path in result.stdout.split('\0'):
              if not path:
                  continue
              try:
                  import os
                  size = os.path.getsize(path)
                  if size > LIMIT:
                      oversized.append(f'{path} ({size:,} bytes)')
              except FileNotFoundError:
                  pass
          if oversized:
              print('Tracked files exceeding 1 MB:', file=sys.stderr)
              print('\n'.join(oversized), file=sys.stderr)
              sys.exit(1)
          print('All tracked files within size limit.')
          "
