- name: mesh-aurora-handshake
  about: Board the mesh and handshake with Aurora (the station's constitutional rule).
  script: |
    import sys, time, tempfile, json, shutil
    sys.path.insert(0, ".")
    from pathlib import Path
    from fastapi.testclient import TestClient
    from src.servers.l2_integration_server import create_app
    tmp = Path(tempfile.mkdtemp())
    for rel in ["config/mesh", "src/dashboard", "src/interfaces"]:
        shutil.copytree(rel, tmp / rel, dirs_exist_ok=True)
    c = TestClient(create_app(tmp))
    r = c.post("/api/mesh/messages", json={"to": "Aurora", "channel": "direct:aurora", "content": "Flight check. Report status."})
    assert r.status_code == 200, r.text
    deadline = time.time() + 3
    while time.time() < deadline:
        events = c.get("/api/mesh/channels/direct%3Aaurora/history?limit=20").json()["events"]
        if any(e["event_type"] == "agent_reply" for e in events):
            print("mesh: Aurora answered the flight-check handshake")
            break
        time.sleep(0.1)
    else:
        raise AssertionError("Aurora did not answer")
- name: narrative-engine-canon-audit
  about: Audit a canonical Thorne action through the validation engine (PR #979/#983).
  script: |
    import sys
    sys.path.insert(0, ".")
    from src.aurora.engines import NarrativeValidationEngine
    from src.aurora.engines.narrative import Verdict
    E = NarrativeValidationEngine()
    run = E.run({
        "task_hint": "character_action_audit",
        "question": "Would Thorne route a flight-check change through Aurora arbitration?",
        "declared_layers": ["character", "motive", "event", "knowledge", "continuity"],
        "entities": [{"name": "Alex Thorne", "entity_type": "character", "role": "Station Commander"}],
        "events": [{"label": "Routine flight check.", "timing": "now", "participants": ["Alex Thorne"]}],
        "motives": [{"actor": "Alex Thorne", "label": "uphold arbitration and ethics validation", "strength": 0.95}],
        "pressures": [{"actor": "Alex Thorne", "label": "duty to the charter", "direction": "toward", "strength": 0.9}],
        "knowledge_states": [{"holder": "Alex Thorne", "fact": "Major actions require Aurora arbitration."}],
        "continuity": {"notes": ["Thorne upholds arbitration discipline."]},
    }, proposal={"actor": "Alex Thorne", "action": "route the change through Aurora arbitration", "type": "action"})
    assert run.response.verdict in (Verdict.SUPPORTED, Verdict.PLAUSIBLE), run.response.verdict
    print("engine: canonical audit verdict =", run.response.verdict.value)
- name: narrative-next-event-continuity-check
  about: Build current chronicle evidence and fly the deterministic phase-two continuity gate.
  script: |
    import json, os, subprocess, sys
    from datetime import datetime, timezone
    from pathlib import Path
    sys.path.insert(0, ".")
    from src.aurora.engines.narrative import (
        NormalizedTaskRequest, Strictness, TaskKind, build_evidence_bundle,
        build_state_from_evidence, next_event_continuity_check,
    )
    workspace_root = Path(os.environ.get("AURORA_WORKSPACE_ROOT", Path.cwd().parents[2]))
    chronicle_path = workspace_root / "GUMAS_SIM_2.5/CanonRec/canon/L1/station/chronicle/STATION_CHRONICLE.ndjson"
    atom = next(json.loads(line) for line in chronicle_path.read_text().splitlines()
                if line.strip() and json.loads(line).get("tier") == "CANON")
    source_id = f"canon:station-chronicle:{atom['event_id']}"
    sources = [
        {"source_id": source_id, "authority_tier": "canon",
         "source_type": "canon_file", "uri": str(chronicle_path),
         "observed_at_utc": atom["occurred_at"]},
        {"source_id": "canon:aurora-identity", "authority_tier": "canon",
         "source_type": "canon_file", "uri": "config/canonical_validation.yaml"},
    ]
    facts = [
        *({"fact_id": f"layer:{layer}", "claim_type": "layer",
           "payload": {"name": layer}, "source_ids": (source_id,),
           "authority_tier": "canon"}
          for layer in ("event", "temporal", "knowledge", "continuity", "character")),
        {"fact_id": f"event:{atom['event_id']}", "claim_type": "event",
         "payload": {"label": atom["summary"], "timing": atom["occurred_at"],
                     "participants": atom.get("participants", [])},
         "source_ids": (source_id,), "authority_tier": "canon"},
        {"fact_id": "entity:alex-thorne", "claim_type": "entity",
         "payload": {"name": "Alex Thorne", "entity_type": "character",
                     "role": "Station Commander"},
         "source_ids": ("canon:aurora-identity",), "authority_tier": "canon"},
        {"fact_id": "knowledge:aurora-arbitration", "claim_type": "knowledge_state",
         "payload": {"holder": "Alex Thorne",
                     "fact": "Major actions require Aurora arbitration and ethics validation."},
         "source_ids": ("canon:aurora-identity",), "authority_tier": "canon"},
        {"fact_id": "continuity:aurora-invariants", "claim_type": "continuity",
         "payload": {"anchor_seed": "EOS_SEED_ORION",
                     "continuity_seal": "Aurora_Continuity_Seal_v2.2.5",
                     "ethics_protocol": "Picard_Delta_3", "drift_lock": 0.0},
         "source_ids": ("canon:aurora-identity",), "authority_tier": "canon"},
    ]
    bundle = build_evidence_bundle(sources, facts, generated_at_utc=atom["occurred_at"])
    request = NormalizedTaskRequest(
        task_kind=TaskKind.NEXT_EVENT_CONTINUITY_CHECK, proposal_present=True,
        strictness=Strictness.DEFAULT, input_kind="evidence_bundle",
        user_query="Can this flight-check beat happen next?",
    )
    proposal = {"actor": "Alex Thorne",
                "action": "route the flight-check change through Aurora arbitration",
                "aurora_arbitration": True, "ethics_validation": True,
                "timing": "next_turn", "type": "event"}
    state, state_receipt = build_state_from_evidence(bundle, request, proposal)
    log_path = workspace_root / "reports/automation/flight_log_latest.json"
    entry = (json.loads(log_path.read_text()).get("flights", {})
             .get("narrative-next-event-continuity-check", {})) if log_path.exists() else {}
    stale = True
    if entry.get("last_flown"):
        last = datetime.strptime(entry["last_flown"], "%Y-%m-%dT%H:%M:%SZ").replace(tzinfo=timezone.utc)
        stale = (datetime.now(timezone.utc) - last).days > 14
    flight_status = {"status": entry.get("status", "missing"), "stale": stale}
    first = next_event_continuity_check(state, proposal, state_receipt,
                                        flight_status=flight_status)
    second = next_event_continuity_check(state, proposal, state_receipt,
                                         flight_status=flight_status)
    assert first.receipt_id == second.receipt_id
    expected_gate = "candidate" if flight_status["status"] == "flown" and not stale \
                    else "owner_review_required"
    assert first.promotion_gate == expected_gate, first.to_dict()
    head = subprocess.check_output(["git", "rev-parse", "--short", "HEAD"], text=True).strip()
    print(f"narrative: head={head}, receipt={first.receipt_id}, gate={first.promotion_gate}")
- name: sensor-array-observation
  about: Pull live sensor readings through the observation surface (PR #1005); verify the one-way principle holds (GET-only).
  script: |
    import sys
    sys.path.insert(0, ".")
    from fastapi.testclient import TestClient
    from api.aurora_api import app
    c = TestClient(app)
    sensor_routes = [r for r in app.routes if getattr(r, "path", "").startswith("/api/sensors")]
    assert sensor_routes, "sensor array not mounted"
    mutating = [r.path for r in sensor_routes if r.methods - {"GET", "HEAD"}]
    assert not mutating, f"one-way principle violated: {mutating}"
    for path in ("/api/sensors/health/status", "/api/sensors/fusion/oscillation-health"):
        r = c.get(path)
        assert r.status_code == 200, f"{path}: {r.status_code} {r.text[:120]}"
    print(f"sensors: {len(sensor_routes)} GET-only routes mounted; health + fusion live")
- name: ord-policy-dispatch
  about: Run a MissionBrief through the live ORD policy engine and verify the dispatch order plus canonical receipt (PR #1016).
  script: |
    import sys
    sys.path.insert(0, ".")
    from modules.ord import DroneType, MissionBrief, OrdPolicyEngine, canonical_sha256
    engine = OrdPolicyEngine()
    order = engine.create_dispatch_order(MissionBrief(
        mission_id="flight-check",
        tool_name="create_or_update_file",
        risk_level=0.55,
        destination="https://github.com/example/repo",
    ))
    assert DroneType.DELTA_SCOUT in order.drones_required, order.drones_required
    assert DroneType.SHADOWFAX in order.drones_required, order.drones_required
    receipt = canonical_sha256(order)
    print(f"ord: dispatch order cut, {len(order.drones_required)} drones required, receipt {receipt[:12]}")
- name: station-roll-call
  about: Muster the original companions (Archy, Oppy, Liora, Starling AU, Riverthread 808) via the Pilot's direct line; all must answer.
  cwd: .
  python: GUMAS_SIM_2.5/Aurora_Sim_Architecture/aurora-cloudbank-symbolic-main/.venv/bin/python
  script: |
    import subprocess, sys
    r = subprocess.run([sys.executable,
                        "tools/station_query.py", "--roll-call", "--receipt",
                        "Scheduled flight-check muster."],
                       capture_output=True, text=True)
    sys.stdout.write(r.stdout)
    assert r.returncode == 0, r.stderr[-300:] or "roll call incomplete"
    print("roll call: all companions awake")
