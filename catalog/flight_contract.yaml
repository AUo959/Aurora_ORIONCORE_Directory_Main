version: 1
purpose: >
  The flight log: declared exercises proving that landed modules actually
  fly. "Recovered" and "merged" are not "exercised" — a module that passes
  its own tests and is never invoked is dormant, and dormancy is the
  successor failure mode to stranding. tools/flight_check.py runs these
  exercises against the LIVE wiring (the real app, the real engine), records
  receipts, and reports staleness; workspace_verify warns when any flight is
  overdue. Default cadence: 14 days.
defaults:
  cwd: GUMAS_SIM_2.5/Aurora_Sim_Architecture/aurora-cloudbank-symbolic-main
  python: GUMAS_SIM_2.5/Aurora_Sim_Architecture/aurora-cloudbank-symbolic-main/.venv/bin/python
  max_age_days: 14
flights:
- name: ethical-checkpoint-vault
  about: Create a checkpoint and roll it back through the live API (recovered PR #986).
  script: |
    import os, sys
    sys.path.insert(0, ".")
    from fastapi.testclient import TestClient
    from src.middleware.fastapi_security import generate_csrf_token
    from api.aurora_api import app
    t = generate_csrf_token("flight")
    h = {"Authorization": f"Bearer {t}", "X-CSRF-Token": t}
    c = TestClient(app)
    r = c.post("/checkpoint/create", json={"agent_id": "pilot", "label": "flight-check", "ethics_state": {"protocol": "Picard_Delta_3"}, "created_by": "pilot"}, headers=h)
    assert r.status_code == 201, r.text
    cid = r.json()["checkpoint_id"]
    rb = c.post(f"/checkpoint/{cid}/rollback", json={"reason": "flight-check", "performed_by": "pilot"}, headers=h)
    assert rb.status_code == 200, rb.text
    print("vault: checkpoint", cid, "created and rolled back")
