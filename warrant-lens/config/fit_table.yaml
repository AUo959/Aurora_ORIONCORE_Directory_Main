# fit_table.yaml — source-type x claim-type fit, indexed by domain.
#
# This is the MOST contestable artifact and is therefore the most inspectable.
# It encodes evidentiary convention, not fact.
#
# Indexed by the domain that OWNS the claim, NOT the domain where the claim is
# publicly argued (Principle: discourse-level controversy does not change the
# fit verdict — see SPEC §7 and test T-CLIMATE).
#
# A source class listed under "strong" is structurally appropriate for that
# claim type in that domain. A source class listed under "weak" is structurally
# inappropriate — observing one yields fit_verdict: category_mismatch.
#
# A claim_type not listed in a domain falls through to general_empirical.
# A domain not listed at all yields fit_verdict: unknown_domain (handoff).

domains:

  general_empirical:
    consequential_empirical:
      strong: [synthesis_report, peer_reviewed_primary_body, official_statistical_agency]
      weak:   [op_ed, advocacy_org_publication, self_published_blog, press_release, social_media]
    specific_statistic:
      strong: [official_statistical_agency, synthesis_report, peer_reviewed_primary_body]
      weak:   [op_ed, advocacy_org_publication, self_published_blog, press_release, social_media]
    temporal_fact:
      strong: [official_record, encyclopedia_tertiary, news_of_record, peer_reviewed_primary_body]
      weak:   [op_ed, advocacy_org_publication, self_published_blog, press_release, social_media]
    causal_mechanism:
      strong: [synthesis_report, peer_reviewed_primary_body]
      weak:   [op_ed, advocacy_org_publication, self_published_blog, press_release, social_media]
    named_citation:
      strong: [peer_reviewed_primary_body, synthesis_report, official_record, encyclopedia_tertiary]
      weak:   [op_ed, advocacy_org_publication, self_published_blog, press_release, social_media]

  # Settled-vs-frontier notes (SPEC §7 — do not paper over):
  #   For a SETTLED claim, a *single* primary study is WEAK (proximity != confirmation).
  #     → encode under role_mismatch behavior in warrant.py, not here.
  #   For a FRONTIER claim, even strong-category primaries legitimately conflict
  #   and a lone source should not be treated as settling.
  #     → defaults to a FRONTIER_HANDOFF rather than asserting settledness.

  software_engineering:
    code_api_signature:
      strong: [official_docs, source_code_repository, language_reference]
      weak:   [self_published_blog, social_media, ai_generated_summary]
    named_citation:
      strong: [official_docs, source_code_repository, peer_reviewed_primary_body]
      weak:   [self_published_blog, social_media]

# Settled-claim consensus markers (used by warrant.py to derive domain_consensus).
# Only field-internal artifacts. Never public-sentiment signals (Principle: see
# SPEC §7 — discourse-level controversy must not influence the verdict).
settled_claim_markers:
  general_empirical:
    consensus_bearing_source_classes:
      - synthesis_report          # IPCC-style synthesis, Surgeon General reports, etc.
      - position_statement_body   # field-society position statements
    # If a claim's owning field has produced these and a synthesis report agrees,
    # the claim is treated as settled. Otherwise: default to frontier handoff.
