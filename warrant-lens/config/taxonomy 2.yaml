# taxonomy.yaml — claim types and whether each makes an evidentiary demand.
#
# evidentiary_demand: false  → claim is filtered at stage [3] and NEVER flagged.
#                              A human can't usefully verify an opinion or
#                              definition; flagging it is noise.
#
# Edit this file to dispute the convention. The line between "convention" and
# "structural fact" is visible by design (Principle 6).

claim_types:
  specific_statistic:        { evidentiary_demand: true }
  named_citation:            { evidentiary_demand: true }
  temporal_fact:             { evidentiary_demand: true }   # specific dates
  causal_mechanism:          { evidentiary_demand: true }
  code_api_signature:        { evidentiary_demand: true }
  consequential_empirical:   { evidentiary_demand: true }
  definition:                { evidentiary_demand: false }
  opinion_normative:         { evidentiary_demand: false }
  hedge_uncertainty:         { evidentiary_demand: false }
  unclassified:              { evidentiary_demand: false }  # cannot push without a class
