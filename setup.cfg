[bandit]
# B101 (assert) skipped — covered by Ruff_S101 at Critical severity with
# per-file-ignores suppressing it in test files. Production asserts have been
# converted to explicit if/raise in tools/. See .codacy/configure-codacy-summary.json.
skips = B101

[tool:pytest]
# Register the custom marks the suite uses so they don't raise
# PytestUnknownMarkWarning (and so `-m simulation` / `-m "not slow"` select
# deterministically). Built-in marks (parametrize, skipif) need no entry.
markers =
    simulation: drives the L1 station-operations simulation harness (hour_aboard / live_watch / crew_life).
    slow: long-running test (subprocess-driven simulation watch blocks).
